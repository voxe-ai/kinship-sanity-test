name: Voxe Deploy to LIVE (overlay)

# Deploys the built site to Hostinger via FTP.
#  - workflow_dispatch: manual run (target_dir blank = live public_html root;
#    set a subdir like _voxe_test/ for a safe dry-run).
#  - repository_dispatch (sanity-publish): fired by the Sanity webhook so a client
#    "Publish" in Sanity auto-rebuilds + redeploys the live site (always live root).
on:
  workflow_dispatch:
    inputs:
      target_dir:
        description: "Remote subdir (BLANK = LIVE public_html root)"
        required: false
        default: ""
  repository_dispatch:
    types: [sanity-publish]

concurrency:
  group: voxe-live-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: u2qzrboc
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Verify build output
        run: |
          test -d out || { echo "::error::no out/ directory"; exit 1; }
          for p in index.html rooms.html homa.html explore.html; do
            test -f "out/$p" || { echo "::error::missing $p"; exit 1; }
          done
          echo "Total files: $(find out -type f | wc -l)"

      - name: Preserve live .htaccess (do NOT deploy one)
        run: |
          rm -f out/.htaccess
          echo "Stripped .htaccess from build output — the hand-managed live .htaccess is left untouched."

      - name: Install FTP client
        run: npm i basic-ftp@5 --no-save

      - name: Overlay deploy to Hostinger (no deletes)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_DIR: ${{ github.event.inputs.target_dir }}
        run: node .github/scripts/deploy-overlay.cjs
