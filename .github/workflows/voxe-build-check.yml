name: Voxe Build Check

# Build-only validation. Runs entirely inside GitHub Actions.
# Does NOT contact Hostinger or deploy anything. Uploads the built
# site as an artifact so we can inspect it.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: u2qzrboc
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Verify build output
        run: |
          test -d out || { echo "::error::no out/ directory"; exit 1; }
          echo "Total files: $(find out -type f | wc -l)"
          for p in index.html rooms.html homa.html explore.html offers.html about.html; do
            if [ -f "out/$p" ]; then
              echo "OK  $p ($(wc -c < "out/$p") bytes)"
            else
              echo "::error::MISSING $p"; exit 1
            fi
          done

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: out-build
          path: out/
          retention-days: 5
